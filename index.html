<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonidos de Animales - Preescolar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        :root {
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --primary: #4CAF50;
        }

        body {
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2e7d32;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            color: #555;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 800px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            max-width: 900px;
            width: 100%;
        }

        .animal-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .animal-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.2);
            border-color: var(--primary);
        }

        .animal-card:active {
            transform: scale(0.95);
        }

        .emoji {
            font-size: 6rem;
            margin-bottom: 1rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .animal-card:hover .emoji {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .playing .emoji {
            animation: bounce 0.5s ease infinite;
        }

        .name {
            font-size: 2rem;
            color: #333;
            font-weight: 600;
        }

        .play-icon {
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 1.2rem;
            display: inline-block;
        }

        /* Enfoque visual: atenuar las tarjetas que no están sonando */
        .grid.focus-active .animal-card:not(.playing) {
            opacity: 0.25;
            filter: grayscale(80%) blur(1px);
            transform: scale(0.92);
            pointer-events: none; /* Evita clics incidentales mientras suena */
        }

        .grid.focus-active .animal-card.playing {
            transform: scale(1.08);
            box-shadow: 0 20px 40px rgba(76, 175, 80, 0.4);
            border-color: var(--primary);
            z-index: 10;
        }
        
        /* Colores segun animal */
        .pescado { border-bottom-color: #29b6f6; }
        .ballena { border-bottom-color: #00838f; }
        .leon { border-bottom-color: #fb8c00; }
        .borrego { border-bottom-color: #cfd8dc; } 
    </style>
</head>
<body>

    <h1>🎵 ¡Escucha los Animales! 🦁</h1>
    <p>Haz clic en cualquier animalito para escuchar el sonido que hace.</p>

    <div class="grid">
        <div class="animal-card pescado" 
             data-sound1="" 
             data-sound2="" 
             data-fallback="¡Glup, glup!">
            <div class="emoji">🐟</div>
            <div class="name">Pescado</div>
            <div class="play-icon">▶️ Escuchar</div>
        </div>

        <div class="animal-card ballena" 
             data-sound1="https://upload.wikimedia.org/wikipedia/commons/b/b5/Humpbackwhale2.ogg" 
             data-sound2="" 
             data-fallback="¡Canta la ballena!">
            <div class="emoji">🐋</div>
            <div class="name">Ballena</div>
            <div class="play-icon">▶️ Escuchar</div>
        </div>

        <div class="animal-card leon" 
             data-sound1="https://upload.wikimedia.org/wikipedia/commons/c/c5/Lion_raring-sound1TamilNadu178.ogg" 
             data-sound2="" 
             data-fallback="¡Grrr, grrr!">
            <div class="emoji">🦁</div>
            <div class="name">León</div>
            <div class="play-icon">▶️ Escuchar</div>
        </div>

        <div class="animal-card borrego" 
             data-sound1="https://upload.wikimedia.org/wikipedia/commons/e/e0/Sheep_bleating.ogg" 
             data-sound2="" 
             data-fallback="¡Beeee, beeee!">
            <div class="emoji">🐑</div>
            <div class="name">Borrego</div>
            <div class="play-icon">▶️ Escuchar</div>
        </div>
    </div>

    <!-- El reproductor web se actualiza dinamicamente con multiples origenes (sources) -->
    <audio id="audio-player" preload="auto"></audio>

    <script>
        const cards = document.querySelectorAll('.animal-card');
        const grid = document.querySelector('.grid');
        const audioPlayer = document.getElementById('audio-player');
        let currentCard = null;
        let syntheticVoiceIsPlaying = false;

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const animalClass = Array.from(card.classList).find(c => c !== 'animal-card' && c !== 'playing');
                const s1 = card.getAttribute('data-sound1');
                const s2 = card.getAttribute('data-sound2');
                const fallbackText = card.getAttribute('data-fallback');
                
                // Detener audio anterior
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                audioPlayer.innerHTML = ''; // Limpiar rutas anteriores
                
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    syntheticVoiceIsPlaying = false;
                }
                
                if (currentCard) {
                    currentCard.classList.remove('playing');
                }
                
                card.classList.add('playing');
                grid.classList.add('focus-active');
                currentCard = card;
                
                const cleanup = () => {
                    card.classList.remove('playing');
                    grid.classList.remove('focus-active');
                    currentCard = null;
                };

                // Si no hay archivos de sonido enlazados (ej. Pescado), usar síntesis directa
                if (!s1 && !s2) {
                    playSynthesizedSound(animalClass, fallbackText, cleanup);
                    return;
                }
                
                // Cargar todas las posibles versiones del audio (MP3 primero, OGG despues)
                if (s1) {
                    let source1 = document.createElement('source');
                    source1.src = s1;
                    source1.type = 'audio/mpeg';
                    audioPlayer.appendChild(source1);
                }
                if (s2) {
                    let source2 = document.createElement('source');
                    source2.src = s2;
                    source2.type = 'audio/ogg';
                    audioPlayer.appendChild(source2);
                }
                
                audioPlayer.load();
                audioPlayer.volume = 1.0;
                
                const audioPromise = audioPlayer.play();

                if (audioPromise !== undefined) {
                    audioPromise.catch(error => {
                        console.log("Error de streaming, activando sintesis integrada:", error);
                        // Sistema infallible: utiliza sonido sintetizado local
                        playSynthesizedSound(animalClass, fallbackText, cleanup);
                    });
                }
            });
        });

        // Detener animacion al finalizar audio
        audioPlayer.addEventListener('ended', () => {
            if (currentCard && !syntheticVoiceIsPlaying) {
                currentCard.classList.remove('playing');
                grid.classList.remove('focus-active');
                currentCard = null;
            }
        });

        // Función de síntesis de audio integrada (Web Audio API)
        function playSynthesizedSound(animalName, fallbackText, onEndCallback) {
            try {
                const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtxClass) {
                    throw new Error("Web Audio API no soportado");
                }
                const audioCtx = new AudioCtxClass();
                
                if (animalName === 'pescado') {
                    // Sonido de burbujas ("bloop, bloop, bloop")
                    let count = 4;
                    let popIdx = 0;
                    
                    function triggerPop() {
                        if (popIdx >= count) {
                            setTimeout(onEndCallback, 300);
                            return;
                        }
                        const osc = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        osc.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        osc.type = 'sine';
                        const startTime = audioCtx.currentTime;
                        const duration = 0.08 + Math.random() * 0.04;
                        
                        osc.frequency.setValueAtTime(350 + Math.random() * 150, startTime);
                        osc.frequency.exponentialRampToValueAtTime(950 + Math.random() * 400, startTime + duration);
                        
                        gainNode.gain.setValueAtTime(0.25, startTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.005, startTime + duration);
                        
                        osc.start(startTime);
                        osc.stop(startTime + duration);
                        
                        popIdx++;
                        setTimeout(triggerPop, 120 + Math.random() * 60);
                    }
                    triggerPop();
                } 
                else if (animalName === 'ballena') {
                    // Silbido de canto de ballena (oscilación y tono flotante)
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    osc.type = 'sine';
                    const startTime = audioCtx.currentTime;
                    const duration = 1.8;
                    
                    osc.frequency.setValueAtTime(450, startTime);
                    osc.frequency.linearRampToValueAtTime(680, startTime + 0.6);
                    osc.frequency.linearRampToValueAtTime(320, startTime + 1.2);
                    osc.frequency.linearRampToValueAtTime(480, startTime + 1.8);
                    
                    gainNode.gain.setValueAtTime(0.001, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.3);
                    gainNode.gain.linearRampToValueAtTime(0.15, startTime + 1.3);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                    setTimeout(onEndCallback, duration * 1000 + 100);
                }
                else if (animalName === 'leon') {
                    // Rugido de león de baja frecuencia con modulación
                    const bufferSize = audioCtx.sampleRate * 1.5;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    for (let i = 0; i < bufferSize; i++) {
                        const t = i / audioCtx.sampleRate;
                        const noise = Math.random() * 2 - 1;
                        const rumble = Math.sin(2 * Math.PI * 75 * t + Math.sin(2 * Math.PI * 12 * t) * 6);
                        data[i] = (noise * 0.45 + rumble * 0.55) * Math.max(0, 1 - t / 1.5);
                    }
                    
                    const noiseNode = audioCtx.createBufferSource();
                    noiseNode.buffer = buffer;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(300, audioCtx.currentTime);
                    filter.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 1.5);
                    
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + 1.5);
                    
                    noiseNode.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    noiseNode.start();
                    setTimeout(onEndCallback, 1600);
                }
                else if (animalName === 'borrego') {
                    // Balido de borrego ("beee") con vibrato LFO
                    const osc = audioCtx.createOscillator();
                    const osc2 = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc2.type = 'triangle';
                    
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc2.frequency.setValueAtTime(205, audioCtx.currentTime);
                    
                    const lfo = audioCtx.createOscillator();
                    lfo.frequency.setValueAtTime(7.5, audioCtx.currentTime); 
                    const lfoGain = audioCtx.createGain();
                    lfoGain.gain.setValueAtTime(25, audioCtx.currentTime);
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    lfoGain.connect(osc2.frequency);
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(750, audioCtx.currentTime);
                    filter.Q.setValueAtTime(2.5, audioCtx.currentTime);
                    
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    const startTime = audioCtx.currentTime;
                    gainNode.gain.setValueAtTime(0.001, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.1);
                    gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.6);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 1.0);
                    
                    lfo.start(startTime);
                    osc.start(startTime);
                    osc2.start(startTime);
                    
                    lfo.stop(startTime + 1.0);
                    osc.stop(startTime + 1.0);
                    osc2.stop(startTime + 1.0);
                    setTimeout(onEndCallback, 1100);
                } else {
                    throw new Error("Animal no reconocido");
                }
            } catch (err) {
                console.warn("Sintetizador falló, usando TTS:", err);
                playTTS(animalName, fallbackText, onEndCallback);
            }
        }

        // Función de voz sintetizada de emergencia (Text-To-Speech)
        function playTTS(animalName, fallbackText, onEndCallback) {
            if ('speechSynthesis' in window) {
                syntheticVoiceIsPlaying = true;
                
                const article = (animalName === 'ballena') ? 'Esta es la' : 'Este es el';
                
                let syllabledName = animalName;
                if (animalName === 'pescado') syllabledName = 'pes... ca... do...';
                else if (animalName === 'ballena') syllabledName = 'ba... lle... na...';
                else if (animalName === 'leon') syllabledName = 'le... ón...';
                else if (animalName === 'borrego') syllabledName = 'bo... rre... go...';
                
                const phrase = `${article}... ${syllabledName}... y hace... ${fallbackText}`;
                
                const utterance = new SpeechSynthesisUtterance(phrase);
                utterance.lang = 'es-MX'; // Español
                utterance.pitch = 1.3; 
                utterance.rate = 0.75; 
                
                utterance.onend = function() {
                    syntheticVoiceIsPlaying = false;
                    onEndCallback();
                };
                
                utterance.onerror = function() {
                    syntheticVoiceIsPlaying = false;
                    onEndCallback();
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                onEndCallback();
            }
        }
    </script>
</body>
</html>
